<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <title>MAYIMTECH — Patient</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="patient">
    <div class="topbar">
      <div class="name">MAYIMTECH</div>
      <div class="conn" id="conn">
        <span class="dot"></span><span id="connText">Connecting…</span>
      </div>
    </div>

    <!-- Patient-facing status: the one thing that must be unmistakable -->
    <section class="status-panel is-normal" id="statusPanel">
      <div class="status-icon" id="statusIcon">!</div>
      <div class="status-head" id="statusHead">You are OK</div>
      <!-- <div class="status-sub" id="statusSub">Your readings look normal.</div> -->
      <div class="status-sub" id="statusSub">
        Your caregiver has been notified.
      </div>
      <button class="cta" id="ackBtn" hidden>I've had some water</button>
    </section>

    <!-- Current readings -->
    <section class="readings">
      <div class="reading" id="rPulse">
        <span class="r-label">
          <svg class="r-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M3 12h4l2-5 4 10 2-5h6" />
          </svg>
          Pulse
        </span>
        <span class="r-value"
          ><span id="pulse">–</span> <span class="unit">bpm</span></span
        >
      </div>
      <div class="reading" id="rTemp">
        <span class="r-label">
          <svg class="r-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M10 14.8V5a2 2 0 0 1 4 0v9.8a4 4 0 1 1-4 0Z" />
            <path d="M12 8v8" />
          </svg>
          Temperature
        </span>
        <span class="r-value"
          ><span id="temp">–</span> <span class="unit">°C</span></span
        >
      </div>
      <div class="reading" id="rMove">
        <span class="r-label">
          <svg class="r-icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="13" cy="4" r="2" />
            <path d="m10 22 1-6-3-3 2-6 4 3 4 1" />
            <path d="m15 22-2-6 2-3" />
          </svg>
          Movement
        </span>
        <span class="r-value"
          ><span id="move">–</span> <span class="unit">%</span></span
        >
      </div>
    </section>

    <!-- Demo controls (for the presenter). The wristband would send these automatically. -->
    <section class="demo-controls" aria-labelledby="demoControlsTitle">
      <div class="controls-title" id="demoControlsTitle">Demo controls</div>

      <div class="push-label">Send a reading</div>
      <div class="demo-actions">
        <button class="btn normal" id="btnNormal">Normal</button>
        <button class="btn high" id="btnHigh">Watch out</button>
        <button class="btn alert" id="btnAlert">Critical</button>
      </div>

      <div class="auto-row">
        <span class="a-label">Auto mode <small>Send every 3 seconds</small></span>
        <label class="toggle" aria-label="Toggle automatic readings"
          ><input type="checkbox" id="autoToggle" /><span class="track"></span
        ></label>
      </div>
    </section>

    <div class="foot">This phone emulates the patient's smart wristband.</div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="firebase-config.js"></script>
    <script src="patient.js"></script>
  </body>
</html>
