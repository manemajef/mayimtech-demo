<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MAYIMTECH — Portal</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      body.portal {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: #eef1f4;
        font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
        margin: 0;
        padding: 20px;
      }
      .portal-card {
        background: #ffffff;
        border: 1px solid #cfd6dd;
        border-radius: 12px;
        padding: 30px;
        width: 100%;
        max-width: 440px;
        text-align: center;
        box-shadow: 0 4px 12px rgba(22, 32, 43, 0.05);
      }
      .portal-logo {
        width: 48px;
        height: 48px;
        background: #1a56c4;
        color: #fff;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 900;
        font-size: 24px;
        margin: 0 auto 16px;
      }
      h1 {
        font-size: 24px;
        margin: 0 0 6px;
        color: #16202b;
      }
      .subtitle {
        font-size: 14px;
        color: #5a6672;
        margin-bottom: 24px;
      }
      .portal-btn {
        display: block;
        width: 100%;
        padding: 14px;
        margin-bottom: 12px;
        font-size: 16px;
        font-weight: 700;
        text-decoration: none;
        text-align: center;
        border-radius: 8px;
        border: 2px solid #16202b;
        background: #ffffff;
        color: #16202b;
        cursor: pointer;
        transition: 0.15s;
      }
      .portal-btn:hover {
        background: #f1f4f7;
      }
      .portal-btn.primary {
        background: #1a56c4;
        border-color: #1a56c4;
        color: #ffffff;
      }
      .portal-btn.primary:hover {
        background: #1545a2;
        border-color: #1545a2;
      }
    </style>
  </head>
  <body class="portal">
    <div class="portal-card">
      <div class="portal-logo">M</div>
      <h1>MAYIMTECH</h1>
      <div class="subtitle">Select an application to launch the live demo</div>
      
      <a href="patient.html" class="portal-btn primary">Patient App Emulator</a>
      <a href="caregiver.html" class="portal-btn">Caregiver Dashboard</a>
    </div>
  </body>
</html>
